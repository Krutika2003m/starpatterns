<!doctype html>
<html lang="en">

  <body>
    <div class="container  rounded m-5 p-3"
     style="background-color: rgb(223, 223, 223); height: 200px;  text-align: center;">
    <h2>To-Do list Manager</h2>
    <input type="text" id="taskInput" placeholder="Enter a task">
    <button class=" btn btn-primary " onclick="AddtoDos()"> Add task</button>
    <button class=" btn btn-primary" onclick=""> clear all</button>
    <div class="container" id="resultToDo" >
    

    </div>
</div>
<script>
   toDos = []
function renderToDos() {
    document.querySelector("#resultToDo").innerHTML = toDos.map((task,index) => `
                              <div>
                              <b>${task}</b>
                              <button class="btn btn-danger"onclick='deletetask'>Delete</button>
                              </div>
`).join("")
}
function addToDo() {
    toDoinput = document.getElementById("taskInput")
    newTODO = toDoinput.value
    toDos.push(newTODO)
    renderToDos()
    console.log(toDoinput.value)
    toDoinput.value = ""
    console.log(toDoinput.value)
}

function clearAllToDo() {
    console.log(toDos)
    toDos = []
    renderToDos()
    console.log(toDos)
}
 
 function deletetask(i) {
    console.log(i)
    toDos.splice(i,1)
    renderToDos()
}
    
</script>
