<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>String Operations</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
<h2>Operation on string in Javascript</h2>
</div>

<div class="content">

<textarea id="textInput" placeholder="Add paragraph here"></textarea>

<button class="result-btn">Result</button>

<div class="buttons">

<button onclick="checkVowels()">Check Vowels</button>
<button onclick="checkConsonants()">Check Consonants</button>
<button onclick="countSpaces()">Count Spaces</button>
<button onclick="countNewLines()">Count New Lines</button>
<button onclick="toLower()">Convert to small case</button>
<button onclick="capitalize()">Capitalise</button>

<button onclick="titleCase()">Title Case</button>
<button onclick="checkPalindrome()">Check palindrome</button>
<button onclick="firstWord()">Extract First Word</button>
<button onclick="replaceSpaces()">Replace spaces with hyphens</button>
<button onclick="reverseText()">Reverse characters</button>
<button onclick="sortWords()">Sort words</button>

</div>

<p id="output"></p>

</div>

<script src="string.js"></script>

</body>
</html>
