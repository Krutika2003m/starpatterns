<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calculator</title>

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.calculator-box{
background:rgb(228, 207, 207);
padding:40px;
border-radius:20px;
box-shadow:0px 5px 15px rgba(0,0,0,0.2);
width:700px;
text-align:center;
}

input{
height:45px;
font-size:18px;
text-align:center;
}

button{
width:120px;
}
</style>
</head>

<body>

<div class="calculator-box">

<h1 class="mb-4 fw-bold">Calculator</h1>

<div class="row justify-content-center mb-4">
<div class="col-md-4">
<input type="number" id="num1" class="form-control" placeholder=" ">
</div>

<div class="col-md-4">
<input type="number" id="num2" class="form-control" placeholder=" ">
</div>
</div>

<div class="d-flex justify-content-center gap-3 mb-4">
<button class="btn btn-primary" onclick="calculate('add')">Add</button>
<button class="btn btn-primary" onclick="calculate('sub')">Subtract</button>
<button class="btn btn-primary" onclick="calculate('mul')">Multiply</button>
<button class="btn btn-primary" onclick="calculate('div')">Divide</button>
</div>

<h2 id="result">Result: </h2>

</div>

<script>

let calculator = {

add:function(a,b){
    return a+b;
},

sub:function(a,b){
    return a-b;
},

mul:function(a,b){
    return a*b;
},

div:function(a,b){
    return a/b;
}

};

function calculate(type){

let num1 = Number(document.getElementById("num1").value);
let num2 = Number(document.getElementById("num2").value);

let result;

if(type=="add"){
result = calculator.add(num1,num2);
}

if(type=="sub"){
result = calculator.sub(num1,num2);
}

if(type=="mul"){
result = calculator.mul(num1,num2);
}

if(type=="div"){
result = calculator.div(num1,num2);
}

document.getElementById("result").innerText = "Result: " + result;

}

</script>

</body>
</html>
